<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Invoice — Hydro Pressure Washing</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root { --bg:#0b0e18;--surface:#12172a;--surface2:#1a1f33;--border:#1e2640;--accent:#00d4aa;--red:#ff4d6d;--yellow:#fbbf24;--text:#c9d3e8;--muted:#4a5470;--font-display:'Bebas Neue',sans-serif;--font-mono:'DM Mono',monospace; }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:var(--font-mono);min-height:100vh;padding:24px 16px}
  .container{max-width:680px;margin:0 auto}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;margin-bottom:20px}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px;flex-wrap:wrap;gap:16px}
  .biz-name{font-family:var(--font-display);font-size:2rem;color:#e8edf8;letter-spacing:3px}
  .biz-info{font-size:0.68rem;color:var(--muted);line-height:2;margin-top:4px}
  .inv-number{text-align:right}
  .inv-number-label{font-size:0.6rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
  .inv-number-val{font-family:var(--font-display);font-size:2rem;color:var(--accent);letter-spacing:2px}
  .inv-number-date{font-size:0.68rem;color:var(--muted)}
  .divider{border:none;border-top:1px solid var(--border);margin:20px 0}
  .section-label{font-size:0.58rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
  .customer-name{font-size:1.1rem;color:#e8edf8;font-weight:500;margin-bottom:4px}
  .customer-info{font-size:0.72rem;color:var(--muted);line-height:1.8}
  table{width:100%;border-collapse:collapse;margin:16px 0}
  thead th{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;padding:10px 12px;text-align:left;background:var(--surface2);border-bottom:1px solid var(--border)}
  tbody td{padding:12px;font-size:0.78rem;border-bottom:1px solid var(--border)}
  tbody tr:last-child td{border-bottom:none}
  .total-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-top:1px solid var(--border)}
  .total-label{font-size:0.72rem;color:var(--muted)}
  .total-val{font-family:var(--font-display);font-size:1.5rem;color:var(--accent);letter-spacing:1px}
  .payment-section{margin-top:20px}
  .payment-grid{display:flex;flex-wrap:wrap;gap:10px;margin-top:10px}
  .payment-pill{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:0.72rem;text-align:center}
  .notes-box{background:var(--surface2);border-radius:10px;padding:16px;font-size:0.72rem;color:var(--muted);line-height:1.8;margin-top:12px}
  .sig-section{margin-top:20px}
  .sig-canvas{width:100%;height:180px;background:var(--surface2);border:2px dashed var(--border);border-radius:10px;cursor:crosshair;touch-action:none}
  .sig-canvas.signed{border-color:var(--accent);border-style:solid}
  .sig-name-input{width:100%;margin-top:10px;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--font-mono);font-size:0.8rem;outline:none}
  .sig-name-input:focus{border-color:var(--accent)}
  .btn{border:none;border-radius:8px;padding:12px 24px;font-family:var(--font-mono);font-size:0.8rem;cursor:pointer;font-weight:500;letter-spacing:0.5px;transition:opacity 0.15s;width:100%;margin-top:10px}
  .btn-accent{background:var(--accent);color:#061210}
  .btn-ghost{background:transparent;border:1px solid var(--border);color:var(--muted)}
  .btn:hover{opacity:0.85}
  .status-badge{display:inline-block;padding:6px 16px;border-radius:20px;font-size:0.7rem;font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .status-sent{background:var(--accent)20;color:var(--accent);border:1px solid var(--accent)40}
  .status-signed{background:#34d39920;color:#34d399;border:1px solid #34d39940}
  .status-paid{background:var(--yellow)20;color:var(--yellow);border:1px solid var(--yellow)40}
  .success-screen{text-align:center;padding:40px 20px}
  .success-icon{font-size:4rem;margin-bottom:16px}
  .success-title{font-family:var(--font-display);font-size:2rem;color:#34d399;letter-spacing:2px;margin-bottom:8px}
  .success-msg{font-size:0.78rem;color:var(--muted);line-height:1.8}
  .loading{text-align:center;padding:60px;color:var(--muted)}
  .error-screen{text-align:center;padding:60px;color:var(--red)}
  @media(max-width:480px){.card{padding:20px 16px}.biz-name{font-size:1.5rem}.header{flex-direction:column}.inv-number{text-align:left}}
</style>
</head>
<body>
<div class="container">
  <div id="loading" class="loading">Loading invoice...</div>
  <div id="invoice-view" style="display:none"></div>
  <div id="success-view" style="display:none" class="card">
    <div class="success-screen">
      <div class="success-icon">✅</div>
      <div class="success-title">SIGNED!</div>
      <div class="success-msg">Your signature has been submitted successfully.<br>Hydro Pressure Washing will be in touch shortly.<br><br>You can now close this page.</div>
    </div>
  </div>
  <div id="error-view" style="display:none" class="card">
    <div class="error-screen">
      <div style="font-size:3rem;margin-bottom:16px">⚠️</div>
      <div style="font-family:var(--font-display);font-size:1.5rem;letter-spacing:2px;margin-bottom:8px">INVOICE NOT FOUND</div>
      <div style="font-size:0.75rem;color:var(--muted)">This invoice link may be invalid or expired.</div>
    </div>
  </div>
</div>

<script>
const WORKER = 'https://dashboard-sheets.jamesfreeman8000.workers.dev';
const BUSINESS = { name:'Hydro Pressure Washing', phone:'609-545-1018', email:'JamesFreeman8000@gmail.com', location:'Malaga, NJ' };

const params = new URLSearchParams(window.location.search);
const invoiceId = params.get('id');
const sheetId   = params.get('sheet');

let invoiceData = null;
let sigCanvas, sigCtx, isDrawing = false, hasSig = false;

async function loadInvoice() {
  if (!invoiceId || !sheetId) { showError(); return; }
  try {
    const r = await fetch(WORKER+'/sheets/get?range='+encodeURIComponent('Invoices!A:Z'));
    const data = await r.json();
    const rows = data.values || [];
    if (rows.length < 2) { showError(); return; }
    const headers = rows[0];
    const row = rows.slice(1).find(r => r[0] == invoiceId);
    if (!row) { showError(); return; }
    invoiceData = {};
    headers.forEach((h,i) => {
      let v = row[i] || '';
      if (h === 'lineItems') { try { v = JSON.parse(v); } catch { v=[]; } }
      if (['subtotal','depositPercent','depositAmount','totalDue'].includes(h)) v = parseFloat(v)||0;
      invoiceData[h] = v;
    });
    renderInvoice();
  } catch(e) { showError(); }
}

function fmt(n) { return (n||0).toLocaleString('en-US',{style:'currency',currency:'USD'}); }
function h(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function renderInvoice() {
  const inv = invoiceData;
  const isSigned = inv.signedDate && inv.signedDate.length > 0;
  const isPaid   = inv.status === 'Paid';
  const lineItems = Array.isArray(inv.lineItems) ? inv.lineItems : [];
  const payMethods = (inv.paymentMethods||'').split(',').filter(Boolean);

  const payIcons = { Venmo:'💜', CashApp:'💚', Zelle:'💙', Check:'📝', Cash:'💵' };
  const payHTML = payMethods.map(p=>'<div class="payment-pill">'+h(payIcons[p]||'')+' '+h(p)+'</div>').join('');

  const statusBadge = isPaid
    ? '<span class="status-badge status-paid">✓ Paid</span>'
    : isSigned
      ? '<span class="status-badge status-signed">✓ Signed</span>'
      : '<span class="status-badge status-sent">Awaiting Signature</span>';

  let sigSection = '';
  if (!isSigned && !isPaid) {
    sigSection = `
    <div class="card">
      <div class="section-label">Your Signature</div>
      <p style="font-size:0.7rem;color:var(--muted);margin-bottom:12px;line-height:1.7">
        By signing below you agree to the services and total amount listed on this invoice.
      </p>
      <canvas id="sig-canvas" class="sig-canvas"></canvas>
      <div style="display:flex;justify-content:flex-end;margin-top:6px">
        <button class="btn btn-ghost" onclick="clearSig()" style="width:auto;padding:6px 14px;font-size:0.68rem">Clear</button>
      </div>
      <input type="text" id="sig-name" class="sig-name-input" placeholder="Type your full name to confirm"/>
      <input type="date" id="sig-date" class="sig-name-input" style="margin-top:8px" value="${new Date().toISOString().split('T')[0]}"/>
      <button class="btn btn-accent" onclick="submitSignature()" style="margin-top:14px">✓ Submit & Sign Invoice</button>
    </div>`;
  } else if (isSigned) {
    sigSection = `
    <div class="card">
      <div class="section-label">Signature</div>
      <div style="background:var(--surface2);border-radius:10px;padding:16px;margin-top:8px">
        ${inv.signatureData ? '<img src="'+h(inv.signatureData)+'" style="width:100%;max-height:120px;object-fit:contain;border-radius:6px"/>' : ''}
        <div style="margin-top:8px;font-size:0.72rem;color:var(--muted)">Signed by: <strong style="color:var(--text)">${h(inv.signatureName)}</strong> on ${h(inv.signedDate)}</div>
      </div>
    </div>`;
  }

  document.getElementById('invoice-view').innerHTML = `
  <div class="card">
    <div class="header">
      <div>
        <div style="font-size:0.6rem;color:var(--accent);letter-spacing:3px;margin-bottom:4px">💧 PRESSURE WASHING</div>
        <div class="biz-name">${h(BUSINESS.name)}</div>
        <div class="biz-info">
          📞 ${h(BUSINESS.phone)}<br>
          ✉️ ${h(BUSINESS.email)}<br>
          📍 ${h(BUSINESS.location)}
        </div>
      </div>
      <div class="inv-number">
        <div class="inv-number-label">Invoice</div>
        <div class="inv-number-val">#${h(String(inv.number))}</div>
        <div class="inv-number-date" style="margin-top:4px">Created: ${h(inv.createdDate)}</div>
        <div class="inv-number-date">Due: ${h(inv.dueDate)}</div>
        <div style="margin-top:8px">${statusBadge}</div>
      </div>
    </div>
    <hr class="divider"/>
    <div class="section-label">Bill To</div>
    <div class="customer-name">${h(inv.customerName)}</div>
    <div class="customer-info">
      ${inv.customerPhone ? '📞 '+h(inv.customerPhone)+'<br>' : ''}
      ${inv.customerEmail ? '✉️ '+h(inv.customerEmail)+'<br>' : ''}
      ${inv.customerAddress ? '📍 '+h(inv.customerAddress) : ''}
    </div>
    <hr class="divider"/>
    <div class="section-label">Services</div>
    <table>
      <thead><tr><th>Description</th><th style="text-align:right">Amount</th></tr></thead>
      <tbody>
        ${lineItems.map(li=>'<tr><td>'+h(li.desc)+'</td><td style="text-align:right;color:var(--accent)">'+fmt(li.amount)+'</td></tr>').join('')}
      </tbody>
    </table>
    <div class="total-row">
      <div>
        <div class="total-label">Subtotal</div>
        ${inv.depositPercent > 0 ? '<div class="total-label" style="margin-top:2px">Deposit ('+inv.depositPercent+'%)</div>' : ''}
      </div>
      <div style="text-align:right">
        <div style="font-size:0.85rem;color:var(--muted)">${fmt(inv.subtotal)}</div>
        ${inv.depositPercent > 0 ? '<div class="total-label" style="color:var(--yellow)">'+fmt(inv.depositAmount)+'</div>' : ''}
      </div>
    </div>
    <div style="background:var(--surface2);border-radius:10px;padding:14px 18px;display:flex;justify-content:space-between;align-items:center;margin-top:8px">
      <div style="font-size:0.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px">Total Due</div>
      <div style="font-family:var(--font-display);font-size:2rem;color:var(--accent);letter-spacing:1px">${fmt(inv.totalDue)}</div>
    </div>
    ${payMethods.length ? '<div class="payment-section"><div class="section-label" style="margin-top:16px">Payment Methods Accepted</div><div class="payment-grid">'+payHTML+'</div></div>' : ''}
    ${inv.notes ? '<div style="margin-top:16px"><div class="section-label">Notes</div><div class="notes-box">'+h(inv.notes)+'</div></div>' : ''}
  </div>
  ${sigSection}
  `;

  document.getElementById('loading').style.display = 'none';
  document.getElementById('invoice-view').style.display = 'block';

  if (!isSigned && !isPaid) initSigCanvas();
}

function initSigCanvas() {
  sigCanvas = document.getElementById('sig-canvas');
  if (!sigCanvas) return;
  sigCtx = sigCanvas.getContext('2d');
  sigCanvas.width  = sigCanvas.offsetWidth * window.devicePixelRatio;
  sigCanvas.height = sigCanvas.offsetHeight * window.devicePixelRatio;
  sigCtx.scale(window.devicePixelRatio, window.devicePixelRatio);
  sigCtx.strokeStyle = '#00d4aa';
  sigCtx.lineWidth   = 2.5;
  sigCtx.lineCap     = 'round';
  sigCtx.lineJoin    = 'round';

  const getPos = (e) => {
    const rect = sigCanvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
  };

  sigCanvas.addEventListener('mousedown',  e => { isDrawing=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); });
  sigCanvas.addEventListener('mousemove',  e => { if(!isDrawing) return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); hasSig=true; sigCanvas.classList.add('signed'); });
  sigCanvas.addEventListener('mouseup',    () => isDrawing=false);
  sigCanvas.addEventListener('mouseleave', () => isDrawing=false);
  sigCanvas.addEventListener('touchstart', e => { e.preventDefault(); isDrawing=true; const p=getPos(e); sigCtx.beginPath(); sigCtx.moveTo(p.x,p.y); }, {passive:false});
  sigCanvas.addEventListener('touchmove',  e => { e.preventDefault(); if(!isDrawing) return; const p=getPos(e); sigCtx.lineTo(p.x,p.y); sigCtx.stroke(); hasSig=true; sigCanvas.classList.add('signed'); }, {passive:false});
  sigCanvas.addEventListener('touchend',   () => isDrawing=false);
}

function clearSig() {
  if (!sigCtx) return;
  sigCtx.clearRect(0,0,sigCanvas.width,sigCanvas.height);
  hasSig = false;
  sigCanvas.classList.remove('signed');
}

async function submitSignature() {
  const name = (document.getElementById('sig-name')?.value||'').trim();
  const date = document.getElementById('sig-date')?.value || new Date().toISOString().split('T')[0];
  if (!hasSig) { alert('Please draw your signature above.'); return; }
  if (!name)   { alert('Please type your full name to confirm.'); return; }

  const sigData = sigCanvas.toDataURL('image/png');

  try {
    const r = await fetch(WORKER+'/sheets/sign-invoice', {
      method: 'POST',
      headers: { 'Content-Type':'application/json' },
      body: JSON.stringify({ invoiceId, signatureName: name, signatureData: sigData, signedDate: date }),
    });
    if (!r.ok) throw new Error('Submit failed');
    document.getElementById('invoice-view').style.display = 'none';
    document.getElementById('success-view').style.display = 'block';
  } catch(e) {
    alert('Error submitting signature. Please try again.');
  }
}

function showError() {
  document.getElementById('loading').style.display  = 'none';
  document.getElementById('error-view').style.display = 'block';
}

loadInvoice();
</script>
</body>
</html>
